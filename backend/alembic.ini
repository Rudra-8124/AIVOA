# ─────────────────────────────────────────────────────────────────
# alembic.ini – Alembic database migration configuration
# Run: alembic revision --autogenerate -m "description"
#      alembic upgrade head
# ─────────────────────────────────────────────────────────────────

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration files
timezone = UTC

# Database URL – overridden by env.py reading from .env
sqlalchemy.url = postgresql+asyncpg://postgres:password@localhost:5432/aivoa_db


[post_write_hooks]
# Optional: run black formatter on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
